security:
    # 1. Password hashing configuration
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # 2. Define where users come from (MongoDB Provider)
    providers:
        app_user_provider:
            mongodb:
                class: App\Document\User
                property: email

    firewalls:
        dev:
            pattern: ^/_(profiler|wdt)/
            security: false

        # 3. Main API firewall protected by JWT
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    # 5. Access Control Rules (The Middleware Layer)
    access_control:
        # Allow anyone to access register and login
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        # Secure absolutely everything else under /api
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }